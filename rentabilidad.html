<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitalforce · Acceso</title>
<style>
  :root{--forest:#1F7A43;--forest-dark:#155C33;--gold:#C9A66B;--sage:#A9C08F;--sage-light:#E9F0E3;--cream:#FBF8F2;--ink:#2B2B26;--muted:#6B6B60;--red:#B03A2E;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:Calibri,"Segoe UI",Cambria,Georgia,serif;background:linear-gradient(135deg,var(--forest-dark),var(--forest) 70%,var(--sage));color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .box{background:var(--cream);border-radius:18px;box-shadow:0 12px 40px rgba(0,0,0,.3);padding:38px 34px;max-width:390px;width:100%;text-align:center;}
  .lock{font-size:2.4rem;margin-bottom:8px;}
  h1{font-family:Cambria,Georgia,serif;color:var(--forest-dark);font-size:1.3rem;margin-bottom:4px;}
  p.sub{color:var(--muted);font-size:.86rem;margin-bottom:22px;}
  input{width:100%;padding:12px 14px;font-size:1.4rem;border:2px solid var(--sage);border-radius:10px;background:#fff;color:var(--ink);text-align:center;letter-spacing:6px;outline:none;font-family:Cambria,Georgia,serif;}
  input:focus{border-color:var(--forest);}
  button{width:100%;margin-top:14px;padding:12px;font-size:1rem;font-weight:700;color:#fff;background:var(--forest);border:none;border-radius:10px;cursor:pointer;font-family:Cambria,Georgia,serif;}
  button:hover{background:var(--forest-dark);}
  button:disabled{opacity:.6;cursor:default;}
  .err{color:var(--red);font-size:.85rem;margin-top:12px;min-height:18px;font-weight:600;}
  .foot{margin-top:18px;color:var(--muted);font-size:.72rem;}
</style>
</head>

    <button id="btn" type="submit">Entrar</button>
  </form>
  <div class="err" id="err"></div>

const VERIFY_URL="https://script.google.com/a/macros/vitalforce.com.uy/s/AKfycbyR1O171khek0AtIacex8Rrb6PNqAdPmYWrWbasb4z5wzWud6S1ZhVMhDTnSwF83zeoLA/exec";

function b64(s){const bin=atob(s);const u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}

async function geoInfo(){
  var info={ip:"",ciudad:"",region:"",pais:""};
  try{
    var ctl=new AbortController(); setTimeout(function(){ctl.abort();},2500);
    var g=await fetch("https://ipapi.co/json/",{signal:ctl.signal});
    if(g.ok){var j=await g.json(); info.ip=j.ip||""; info.ciudad=j.city||""; info.region=j.region||""; info.pais=j.country_name||"";}
  }catch(_){}
  return info;
}

function verificar(code, geo){
  return new Promise(function(resolve){
    if(!VERIFY_URL || VERIFY_URL.indexOf("http")!==0){ resolve(null); return; }
    var cbName="__vf_cb_"+Math.floor(Date.now())+"_"+Math.floor(Math.random()*100000);
    var sc=document.createElement("script");
    var done=false;
    function cleanup(){ try{delete window[cbName];}catch(_){ window[cbName]=undefined; } if(sc&&sc.parentNode) sc.parentNode.removeChild(sc); }
    var timer=setTimeout(function(){ if(!done){done=true; cleanup(); resolve(null);} },12000);
    window[cbName]=function(resp){ if(done)return; done=true; clearTimeout(timer); cleanup(); resolve(resp); };
    var params="code="+encodeURIComponent(code)+"&cb="+cbName+
      "&ip="+encodeURIComponent(geo.ip)+"&ciudad="+encodeURIComponent(geo.ciudad)+
      "&region="+encodeURIComponent(geo.region)+"&pais="+encodeURIComponent(geo.pais)+
      "&ua="+encodeURIComponent(navigator.userAgent);
    sc.src=VERIFY_URL+(VERIFY_URL.indexOf("?")>=0?"&":"?")+params;
    sc.onerror=function(){ if(!done){done=true; clearTimeout(timer); cleanup(); resolve(null);} };
    document.body.appendChild(sc);
  });
}

async function descifrar(M){
  var enc=new TextEncoder();
  var km=await crypto.subtle.importKey("raw",enc.encode(M),"PBKDF2",false,["deriveKey"]);
  var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(SALT),iterations:ITER,hash:HASH},km,{name:"AES-CBC",length:256},false,["decrypt"]);
  var buf=await crypto.subtle.decrypt({name:"AES-CBC",iv:b64(IV)},key,b64(CT));
  return new TextDecoder().decode(buf);
}

document.getElementById("f").addEventListener("submit", async function(e){
  e.preventDefault();
  var btn=document.getElementById("btn"), err=document.getElementById("err");
  var code=(document.getElementById("code").value||"").replace(/\D/g,"");
  err.textContent=""; btn.disabled=true; btn.textContent="Verificando...";
  try{
    var geo=await geoInfo();
    var resp=await verificar(code, geo);
    if(resp && resp.ok && resp.key){
      var html=await descifrar(resp.key);
      if(html && (html.indexOf("<!DOCTYPE")>=0 || html.indexOf("<html")>=0)){
        document.open(); document.write(html); document.close(); return;
      }
      err.textContent="No se pudo abrir el tablero. Avisá al administrador.";
    } else if(resp && resp.wait){
      err.textContent="Demasiados intentos. Esperá un minuto y probá de nuevo.";
    } else {
      err.textContent="Código inválido o vencido. Verificá en tu app de autenticación.";
    }
  }catch(_){
    err.textContent="No se pudo verificar. Probá de nuevo.";
  }
  btn.disabled=false; btn.textContent="Entrar";
});
</script>

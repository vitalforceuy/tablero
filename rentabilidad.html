<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitalforce · Acceso</title>
<style>
  :root{--forest:#1F7A43;--forest-dark:#155C33;--gold:#C9A66B;--sage:#A9C08F;--sage-light:#E9F0E3;--cream:#FBF8F2;--ink:#2B2B26;--muted:#6B6B60;--red:#B03A2E;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:Calibri,"Segoe UI",Cambria,Georgia,serif;background:linear-gradient(135deg,var(--forest-dark),var(--forest) 70%,var(--sage));color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .box{background:var(--cream);border-radius:18px;box-shadow:0 12px 40px rgba(0,0,0,.3);padding:38px 34px;max-width:380px;width:100%;text-align:center;}
  .lock{font-size:2.4rem;margin-bottom:8px;}
  h1{font-family:Cambria,Georgia,serif;color:var(--forest-dark);font-size:1.3rem;margin-bottom:4px;}
  p.sub{color:var(--muted);font-size:.86rem;margin-bottom:22px;}
  input{width:100%;padding:12px 14px;font-size:1rem;border:2px solid var(--sage);border-radius:10px;background:#fff;color:var(--ink);text-align:center;letter-spacing:1px;outline:none;}
  input:focus{border-color:var(--forest);}
  button{width:100%;margin-top:14px;padding:12px;font-size:1rem;font-weight:700;color:#fff;background:var(--forest);border:none;border-radius:10px;cursor:pointer;font-family:Cambria,Georgia,serif;}
  button:hover{background:var(--forest-dark);}
  button:disabled{opacity:.6;cursor:default;}
  .err{color:var(--red);font-size:.85rem;margin-top:12px;min-height:18px;font-weight:600;}
  .foot{margin-top:18px;color:var(--muted);font-size:.72rem;}
</style>
</head>
<body>
<div class="box">
  <div class="lock">🔒</div>
  <h1>Rentabilidad Vitalforce</h1>
  <p class="sub">Contenido privado. Ingresá el código de acceso para ver el tablero.</p>
  <form id="f" autocomplete="off">
    <input id="code" type="password" placeholder="Código de acceso" autofocus>
    <button id="btn" type="submit">Entrar</button>
  </form>
  <div class="err" id="err"></div>
  <div class="foot">Agroinsumos Tres Esquinas SRL · Uso interno</div>
</div>

async function entrar(pass){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey("raw",enc.encode(pass),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(SALT),iterations:ITER,hash:HASH},km,{name:"AES-CBC",length:256},false,["decrypt"]);
  const buf=await crypto.subtle.decrypt({name:"AES-CBC",iv:b64(IV)},key,b64(CT));
  return new TextDecoder().decode(buf);
}
document.getElementById("f").addEventListener("submit",async(e)=>{
  e.preventDefault();
  const btn=document.getElementById("btn"), err=document.getElementById("err");
  const code=document.getElementById("code").value;
  err.textContent=""; btn.disabled=true; btn.textContent="Verificando...";
  try{
    const html=await entrar(code);
    if(html.indexOf("<!DOCTYPE")===-1 && html.indexOf("<html")===-1) throw new Error("bad");
    document.open(); document.write(html); document.close();
  }catch(_){
    err.textContent="Código incorrecto. Probá de nuevo.";
    btn.disabled=false; btn.textContent="Entrar";
  }
});
